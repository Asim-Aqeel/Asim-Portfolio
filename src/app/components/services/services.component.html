<section id="services" class="services">
  <div class="wrap">

    <div class="eyebrow">what i offer</div>
    <h2 class="headline">Services &amp; Expertise</h2>
    <p class="sub">End-to-end development across frontend, backend, cloud and infrastructure — built for production, not just demos.</p>

    <div class="grid">
      <div
        class="svc-card"
        *ngFor="let s of services"
        [attr.data-accent]="s.accent"
        tabindex="0">
        <div class="svc-icon" [innerHTML]="getSafeIcon(s.icon)"></div>
        <div class="svc-title">{{ s.title }}</div>
        <p class="svc-desc">{{ s.description }}</p>
      </div>
    </div>

  </div>
</section>
