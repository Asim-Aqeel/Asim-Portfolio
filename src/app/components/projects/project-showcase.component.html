<!--
  PROJECT SHOWCASE — Scroll Stack
  ════════════════════════════════════════════════════════════
  Usage in your existing page:

    <app-project-showcase></app-project-showcase>

  Edit project data in the `projects` array in the .ts file.
  Add / remove objects freely — layout auto-adjusts.
  ════════════════════════════════════════════════════════════
-->

<section id="projects" class="showcase-section" #section>
  <div class="section-header">
    <span class="sl">MY WORK</span>
    <h2 class="sh">Featured Projects</h2>
    <p class="sdesc">Real-world systems built and shipped. Scroll through each one.</p>
  </div>
  <div class="cards-viewport">

    <article
      class="project-card"
      *ngFor="let project of projects"
      #card
    >
      <!-- Left: Info ──────────────────────────────────────────── -->
      <div class="card-info">

        <span class="card-label">
          {{ project.label }} &bull; {{ project.year }}
        </span>

        <h2 class="card-title">{{ project.title }}</h2>

        <p class="card-desc">{{ project.description }}</p>

        <div class="card-tags" *ngIf="project.tags?.length">
          <span class="tag" *ngFor="let tag of project.tags">{{ tag }}</span>
        </div>

        <div class="card-actions" *ngIf="project.liveUrl || project.githubUrl">
          <a
            *ngIf="project.liveUrl"
            [href]="project.liveUrl"
            target="_blank"
            rel="noopener noreferrer"
            class="btn-live"
          >
            <span>View Project</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13"
              viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M7 17L17 7M7 7h10v10"/>
            </svg>
          </a>

          <a
            *ngIf="project.githubUrl"
            [href]="project.githubUrl"
            target="_blank"
            rel="noopener noreferrer"
            class="btn-github"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"
              viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.4.6.11.82-.26.82-.58v-2.03c-3.34.72-4.04-1.61-4.04-1.61-.55-1.38-1.34-1.75-1.34-1.75-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.23 1.84 1.23 1.07 1.83 2.8 1.3 3.49 1 .1-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.14-.3-.54-1.52.1-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02 0 2.04.13 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.64 1.66.24 2.88.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58C20.57 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/>
            </svg>
            <span>GitHub</span>
          </a>
        </div>

      </div>

      <!-- Right: Laptop Mockup ────────────────────────────────── -->
      <div class="card-mockup">
        <div class="laptop-wrap">
          <div class="laptop-screen">
            <div class="laptop-chrome">
              <span class="lc-dot lc-red"></span>
              <span class="lc-dot lc-yellow"></span>
              <span class="lc-dot lc-green"></span>
            </div>
            <img
              [src]="project.image"
              [alt]="project.title + ' preview'"
              (error)="onImageError($event)"
              loading="lazy"
            />
          </div>
          <div class="laptop-base">
            <div class="laptop-notch"></div>
          </div>
        </div>
      </div>

    </article>

  </div>
</section>
